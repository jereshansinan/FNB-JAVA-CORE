name: FastAPI Cloud Simulation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # These simulate your AWS services in the cloud runner!
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      minio:
        image: quay.io/minio/minio:latest
        env:
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: password123
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pymongo boto3 pytest httpx

      - name: Run Handshake Test
        run: |
          # This runs your main.py logic to ensure connections are healthy
          python month-03-cloud-sim/services/main.py & 
          sleep 5
          pytest  # You would add actual test files here later
